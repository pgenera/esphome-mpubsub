# Single device that runs BOTH the existing ESPHome `mqtt:` component and the
# new `multicast_pubsub:` component, and bridges messages between them. This
# demonstrates that multicast_pubsub is complementary, not a replacement.
#
# This file is for documentation / `esphome config` validation only — running
# it end-to-end requires an MQTT broker reachable from the host.

esphome:
  name: pubsub-bridge

# MQTT support is not available on the host platform, so the bridge example
# targets esp32. It's intentionally `esphome config`-only — it documents that
# both components can coexist on a real device. End-to-end testing of the
# bridge requires hardware plus a reachable MQTT broker; the multicast_pubsub
# half is exercised by tests/publisher.yaml + tests/subscriber.yaml on host.
esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: "example"
  password: "example-password"

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ../components
    components: [multicast_pubsub]

mqtt:
  broker: 127.0.0.1
  port: 1883
  discovery: false
  on_message:
    - topic: "bridge/in/temp"
      then:
        - multicast_pubsub.publish:
            topic: "home/livingroom/temp"
            payload: !lambda 'return x;'

multicast_pubsub:
  scope: link-local
  on_message:
    - topic: "home/livingroom/temp"
      then:
        - mqtt.publish:
            topic: "bridge/out/temp"
            payload: !lambda |-
              return std::string(reinterpret_cast<const char*>(x.data()), x.size());
