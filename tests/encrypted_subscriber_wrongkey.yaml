esphome:
  name: pubsub-subscriber-wrong

host:

logger:
  level: VERBOSE

external_components:
  - source:
      type: local
      path: ../components
    components: [mpubsub]

mpubsub:
  port: 18512
  scope: link-local
  hops: 1
  encryption:
    key: "different-key"

sensor:
  - platform: mpubsub
    topic: "test/temp"
    name: "Subscribed Temperature"
    mode: subscribe
    accuracy_decimals: 1
