# Step-3 integration test: publishes a typed RoomClimate message every
# second. The companion typed_subscriber.yaml receives it and logs the
# typed fields.
#
# Typed publish currently goes through a small lambda action -- the
# generated `On<Msg>Trigger` covers the receive side; the YAML sugar
# for a typed publish: action (message: + values:) is a planned
# follow-up. The publish<T> C++ template makes the lambda short.

esphome:
  name: pubsub-typed-publisher

host:

logger:
  level: DEBUG

api:

external_components:
  - source:
      type: local
      path: ../components
    components: [multicast_pubsub]

multicast_pubsub:
  id: pubsub
  scope: link-local
  messages:
    - id: room_climate
      fields:
        - { name: temperature, type: float,  tag: 1 }
        - { name: humidity,    type: float,  tag: 2 }
        - { name: room_id,     type: string, tag: 3 }
    - id: door_events
      fields:
        - { name: door_id, type: string,  tag: 1 }
        # Repeated fields: a list of recent open-timestamps (in seconds
        # since boot) plus a list of free-form event tags. Exercises both
        # numeric and string repeated wire paths end-to-end.
        - { name: open_at, type: uint32,  tag: 2, repeated: true }
        - { name: tags,    type: string,  tag: 3, repeated: true }

sensor:
  - platform: template
    id: source_temp
    name: "Source Temperature"
    lambda: 'return 20.0f + (millis() / 1000) % 10;'
    update_interval: 1s
  - platform: template
    id: source_hum
    name: "Source Humidity"
    lambda: 'return 40.0f + (millis() / 1000) % 20;'
    update_interval: 1s

interval:
  - interval: 1s
    then:
      # Fluent typed publish via the LightCall-style builder. The
      # generated `RoomClimate::Call` class chains set_<field>() calls
      # and finishes with perform(), which encodes and publishes.
      - lambda: |-
          using esphome::multicast_pubsub::messages::RoomClimate;
          id(pubsub)->make_call<RoomClimate>("test/climate")
              .set_temperature(id(source_temp).state)
              .set_humidity(id(source_hum).state)
              .set_room_id("test-room")
              .perform();

  - interval: 2s
    then:
      # Repeated-field exercise: publishes a DoorEvents message with two
      # open-timestamps and two tag strings. Each add_X() chains.
      - lambda: |-
          using esphome::multicast_pubsub::messages::DoorEvents;
          uint32_t now = millis() / 1000;
          id(pubsub)->make_call<DoorEvents>("test/door")
              .set_door_id("front")
              .add_open_at(now)
              .add_open_at(now - 30)
              .add_tags("button")
              .add_tags("auto")
              .perform();

  - interval: 3s
    then:
      # DynamicMessage exercise: builds a RoomClimate-compatible message
      # at runtime using the schemaless DynamicMessage builder (no typed
      # struct involved on the publish side). Receivers with the typed
      # RoomClimate schema decode it normally -- proves DynamicMessage's
      # wire output matches the codegen-emitted encoder byte-for-byte.
      - lambda: |-
          using esphome::multicast_pubsub::DynamicMessage;
          using esphome::multicast_pubsub::DynamicReader;
          using esphome::multicast_pubsub::messages::RoomClimate;
          DynamicMessage m;
          m.add_float(1, 99.5f)              // temperature
           .add_float(2, 88.0f)              // humidity
           .add_string(3, "dynamic-room");   // room_id

          // Self-check: read the bytes back with DynamicReader before
          // publishing, so a single test exercises both halves of the
          // schemaless API in one shot.
          DynamicReader r(m.bytes());
          unsigned fields = 0;
          float temp = 0.0f;
          std::string_view room;
          while (auto f = r.next()) {
            ++fields;
            if (f->tag == 1) f->as_float(&temp);
            if (f->tag == 3) f->as_string(&room);
          }
          ESP_LOGD("main", "dynamic self-check: fields=%u temp=%.2f room='%.*s' err=%d",
                   fields, temp, (int)room.size(), room.data(), r.error());

          id(pubsub)->publish_dynamic("test/climate", RoomClimate::SCHEMA_ID, m.bytes());
