# Example 10 (ESP8266): publisher.
#
# arduino-esp8266 ships precompiled lwip2 with `LWIP_SOCKET=0`, so the
# BSD-style IPv6 multicast API isn't exposed there. Instead, the ESP8266
# build of mpubsub talks directly to lwip's raw UDP/MLD6 API
# (`udp_new_ip_type`, `udp_sendto`, `mld6_joingroup`, ...). This requires
# the IPv6 lwip variant -- selected automatically by `network: enable_ipv6: true`
# which adds `-DPIO_FRAMEWORK_ARDUINO_LWIP2_IPV6_LOW_MEMORY`.

esphome:
  name: pubsub-esp8266-publisher

esp8266:
  board: nodemcuv2

# mpubsub speaks IPv6; on ESP8266 this also selects the
# lwip2_ipv6 framework variant.
network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

external_components:
  - source: { type: local, path: ../components }
    components: [mpubsub]

mpubsub:
  scope: link-local

interval:
  - interval: 5s
    then:
      - mpubsub.publish:
          topic: "home/heartbeat"
          payload: "tick"
