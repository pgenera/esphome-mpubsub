# Example 3: A doorbell button that fans out to every chime on the network.
#
# Pressing a GPIO-attached button publishes an empty datagram on
# `home/doorbell/front`. Every device that subscribes -- the kitchen chime,
# a screen in the office, a smart bulb -- reacts independently. There is no
# 1:1 wiring, no MQTT broker, and no cloud server.

esphome:
  name: front-door-button

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

external_components:
  - source: { type: local, path: ../components }
    components: [multicast_pubsub]

multicast_pubsub:
  scope: link-local

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    name: "Front Doorbell Button"
    on_press:
      - multicast_pubsub.publish:
          topic: "home/doorbell/front"
          payload: "ring"
