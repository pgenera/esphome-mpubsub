# Example 12 (ESP32): publisher.
#
# On ESP32 the component goes through the standard ESPHome `socket::`
# abstraction (BSD-style sockets via lwip's POSIX layer), which the
# ESP-IDF framework exposes natively. `network: enable_ipv6: true` is
# still required -- without it lwip is built without IPv6 and the
# multicast group join fails.

esphome:
  name: pubsub-esp32-publisher

esp32:
  board: esp32dev
  framework:
    type: esp-idf

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

external_components:
  - source: { type: local, path: ../components }
    components: [mpubsub]

mpubsub:
  scope: link-local

interval:
  - interval: 5s
    then:
      - mpubsub.publish:
          topic: "home/heartbeat"
          payload: "tick"
