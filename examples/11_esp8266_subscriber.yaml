# Example 11 (ESP8266): Drop-in skeleton for an ESP8266 subscriber.
#
# See `10_esp8266_publisher.yaml` for the platform caveat: on ESP8266
# the component compiles but is a no-op at runtime, because
# arduino-esp8266's precompiled lwip2 has `LWIP_SOCKET=0`. The YAML
# below is structurally complete and ready to start receiving once
# ESP8266 support lands.

esphome:
  name: pubsub-esp8266-subscriber

esp8266:
  board: nodemcuv2

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

external_components:
  - source: { type: local, path: ../components }
    components: [multicast_pubsub]

multicast_pubsub:
  scope: link-local
  on_message:
    - topic: "home/heartbeat"
      then:
        - logger.log: "heartbeat received"
