# Example 11 (ESP8266): subscriber.
#
# See `10_esp8266_publisher.yaml` for the platform notes -- the ESP8266
# build of multicast_pubsub uses lwip's raw UDP/MLD6 API directly,
# enabled by `network: enable_ipv6: true`.

esphome:
  name: pubsub-esp8266-subscriber

esp8266:
  board: nodemcuv2

network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

external_components:
  - source: { type: local, path: ../components }
    components: [multicast_pubsub]

multicast_pubsub:
  scope: link-local
  on_message:
    - topic: "home/heartbeat"
      then:
        - logger.log: "heartbeat received"
