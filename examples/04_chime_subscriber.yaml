# Example 4: One of the chime devices that responds to example 03.
#
# Any number of these can exist on the network. They all hear the same
# doorbell press because IPv6 multicast delivers the datagram once over
# the wire to every joiner -- there's no broker fan-out cost.

esphome:
  name: kitchen-chime

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

external_components:
  - source: { type: local, path: ../components }
    components: [mpubsub]

output:
  - platform: ledc
    pin: GPIO25
    id: buzzer_out

rtttl:
  output: buzzer_out
  id: doorbell_tune

mpubsub:
  scope: link-local
  on_message:
    - topic: "home/doorbell/front"
      then:
        - rtttl.play: "two-tone:d=4,o=5,b=100:8e6,8c6"
